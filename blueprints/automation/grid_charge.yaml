blueprint:
  name: Grid Charge
  description: |
    Enables EV grid charging only while the current energy price is at or below a configurable maximum.
    - Starts charging by setting Goodwe EMS mode to Battery standby before raising charger maximum current
    - Stops grid charging when the price rises above the maximum, the price sensor is unavailable, or the enable switch is turned off
    - Stops only sessions tracked by the Grid Charge Active Helper by setting charger maximum current to 0, then setting Goodwe EMS mode back to Auto
    - Leaves charger current untouched while inactive so solar or other automations can control it
  domain: automation
  source_url: https://github.com/yourusername/auto-charge
  input:
    energy_price_sensor:
      name: Energy Price Sensor
      description: Sensor that shows the current energy price (in €/kWh)
      selector:
        entity:
          domain: sensor

    max_energy_price:
      name: Maximum Energy Price
      description: Maximum energy price at which grid charging is allowed (in €/kWh). Grid charging stops above this price.
      default: 0.10
      selector:
        number:
          min: 0.0
          max: 1.0
          step: 0.01
          unit_of_measurement: "€/kWh"

    max_current_entity:
      name: Maximum Current Control
      description: Number entity that controls the charger's maximum current
      selector:
        entity:
          domain: number

    max_current:
      name: Maximum Current
      description: Charging current to set while grid charge is active
      default: 32
      selector:
        number:
          min: 6
          max: 32
          step: 1
          unit_of_measurement: "A"

    enable_switch:
      name: Grid Charge Enable Switch
      description: Toggle switch to enable/disable grid charging (input_boolean)
      selector:
        entity:
          domain: input_boolean

    grid_charge_state_helper:
      name: Grid Charge Active Helper
      description: >
        Input boolean helper used to track whether this automation currently owns a grid-charge session.
        Create one in Settings > Devices & Services > Helpers.
      selector:
        entity:
          domain: input_boolean

    ems_mode_entity:
      name: Goodwe EMS Mode Entity
      description: Select entity for Goodwe EMS mode
      selector:
        entity:
          domain: select

    ems_mode_active_option:
      name: EMS Mode When Grid Charge Is Active
      description: Option to set when grid charge is enabled
      default: "Battery standby"
      selector:
        text:

    ems_mode_inactive_option:
      name: EMS Mode When Grid Charge Is Inactive
      description: Option to set when grid charge is disabled
      default: "Auto"
      selector:
        text:

variables:
  cfg_max_current: !input max_current
  max_current_entity_id: !input max_current_entity
  enable_switch_entity: !input enable_switch
  grid_charge_state_entity: !input grid_charge_state_helper
  energy_price_entity: !input energy_price_sensor
  cfg_max_energy_price: !input max_energy_price
  ems_mode_entity_id: !input ems_mode_entity
  cfg_ems_mode_active_option: !input ems_mode_active_option
  cfg_ems_mode_inactive_option: !input ems_mode_inactive_option

trigger:
  - id: "sync"
    platform: time_pattern
    seconds: "/20"
  - id: "switch_toggled"
    platform: state
    entity_id: !input enable_switch
  - id: "price_changed"
    platform: state
    entity_id: !input energy_price_sensor
  - id: "homeassistant_started"
    platform: homeassistant
    event: start

action:
  - variables:
      grid_charge_enabled: "{{ states(enable_switch_entity) == 'on' }}"
      price_sensor_ready: "{{ states(energy_price_entity) not in ['unavailable', 'unknown', 'none'] }}"
      current_entity_ready: "{{ states(max_current_entity_id) not in ['unavailable', 'unknown', 'none'] }}"
      grid_charge_state_ready: "{{ states(grid_charge_state_entity) not in ['unavailable', 'unknown', 'none'] }}"
      grid_charge_is_active: "{{ states(grid_charge_state_entity) == 'on' }}"
      ems_mode_entity_ready: >
        {{ states(ems_mode_entity_id) not in ['unavailable', 'unknown', 'none'] }}
      current_max_amps: "{{ states(max_current_entity_id) | float(0) }}"

  - variables:
      grid_charge_conditions_met: >
        {{ price_sensor_ready | bool(false)
           and states(energy_price_entity) | float(999999) <= cfg_max_energy_price | float(0)
           and current_entity_ready | bool(false)
           and grid_charge_state_ready | bool(false)
           and ems_mode_entity_ready | bool(false) }}
      grid_charge_was_active: >
        {{ grid_charge_is_active | bool(false) }}

  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ grid_charge_enabled | bool(false)
                 and grid_charge_conditions_met | bool(false) }}
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {{ (grid_charge_state_ready | bool(false))
                         and not (grid_charge_is_active | bool(false)) }}
                sequence:
                  - service: input_boolean.turn_on
                    target:
                      entity_id: !input grid_charge_state_helper
          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {{ (ems_mode_entity_ready | bool(false))
                         and (states(ems_mode_entity_id) != (cfg_ems_mode_active_option | string)) }}
                sequence:
                  - service: select.select_option
                    target:
                      entity_id: !input ems_mode_entity
                    data:
                      option: "{{ cfg_ems_mode_active_option }}"
          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {{ (current_entity_ready | bool(false))
                         and current_max_amps | float(0) != cfg_max_current | float(0) }}
                sequence:
                  - service: number.set_value
                    target:
                      entity_id: !input max_current_entity
                    data:
                      value: "{{ cfg_max_current }}"

      - conditions:
          - condition: template
            value_template: "{{ grid_charge_was_active | bool(false) }}"
        sequence:
          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {{ (current_entity_ready | bool(false))
                         and current_max_amps | float(0) != 0 }}
                sequence:
                  - service: number.set_value
                    target:
                      entity_id: !input max_current_entity
                    data:
                      value: 0
          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {{ (ems_mode_entity_ready | bool(false))
                         and (current_entity_ready | bool(false))
                         and (states(ems_mode_entity_id) != (cfg_ems_mode_inactive_option | string)) }}
                sequence:
                  - service: select.select_option
                    target:
                      entity_id: !input ems_mode_entity
                    data:
                      option: "{{ cfg_ems_mode_inactive_option }}"
          - wait_template: >
              {{ states(max_current_entity_id) not in ['unavailable', 'unknown', 'none']
                 and states(ems_mode_entity_id) not in ['unavailable', 'unknown', 'none']
                 and states(max_current_entity_id) | float(999999) == 0
                 and states(ems_mode_entity_id) == (cfg_ems_mode_inactive_option | string) }}
            timeout: "00:00:15"
            continue_on_timeout: true
          - choose:
              - conditions:
                  - condition: template
                    value_template: >
                      {{ (current_entity_ready | bool(false))
                         and (ems_mode_entity_ready | bool(false))
                         and states(max_current_entity_id) | float(999999) == 0
                         and states(ems_mode_entity_id) == (cfg_ems_mode_inactive_option | string)
                         and (grid_charge_state_ready | bool(false)) }}
                sequence:
                  - service: input_boolean.turn_off
                    target:
                      entity_id: !input grid_charge_state_helper

mode: restart
