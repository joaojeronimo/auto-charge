blueprint:
  name: Solar Charge Dynamic Current
  description: |
    Dynamically adjusts EV charging current from net grid power.
    - Power sensor must be negative when exporting and positive when importing
    - Targets a small export margin equal to the configured power buffer
    - Raises current when export exceeds the buffer
    - Lowers current when importing or when export drops below the buffer
    - Turning off solar charge or leaving the schedule window sets charger current to 0A
    - If the computed target is below min_current, charging is stopped instead of forcing a too-low active current
  domain: automation
  source_url: https://github.com/yourusername/auto-charge
  input:
    power_sensor:
      name: Power Sensor
      description: Grid power sensor (negative when exporting to grid, positive when importing)
      selector:
        entity:
          domain: sensor
          device_class: power

    max_current_entity:
      name: Maximum Current Control
      description: Number entity that controls the charger's maximum current
      selector:
        entity:
          domain: number

    voltage:
      name: Grid Voltage
      description: Your grid voltage (typically 230V or 240V)
      default: 230
      selector:
        number:
          min: 100
          max: 250
          step: 1
          unit_of_measurement: "V"

    phases:
      name: Number of Phases
      description: Number of phases your charger uses (1 for single-phase, 3 for three-phase)
      default: 1
      selector:
        number:
          min: 1
          max: 3
          step: 1

    power_buffer:
      name: Power Buffer
      description: Safety buffer in Watts. The automation aims to keep this much export headroom.
      default: 100
      selector:
        number:
          min: 0
          max: 1000
          step: 50
          unit_of_measurement: "W"

    adjustment_interval:
      name: Adjustment Interval
      description: >-
        How often to rerun the periodic adjustment, using Home Assistant time pattern
        syntax for the seconds field. Examples: `/5`, `/10`, `/15`, `/20`, `/30`.
      default: "/10"
      selector:
        text:

    min_current:
      name: Minimum Current
      description: Minimum charging current while solar charging is active. Set to 6A if your charger cannot charge below 6A.
      default: 0
      selector:
        number:
          min: 0
          max: 16
          step: 1
          unit_of_measurement: "A"

    max_current:
      name: Maximum Current
      description: Maximum charging current (typically 16A or 32A)
      default: 32
      selector:
        number:
          min: 6
          max: 32
          step: 1
          unit_of_measurement: "A"

    schedule_start:
      name: Schedule Start Time
      description: Start time for charging window
      default: "09:00:00"
      selector:
        time:

    enable_switch:
      name: Solar Charge Enable Switch
      description: Toggle switch to enable/disable solar charging. Turning this off sets charger current to 0A.
      selector:
        entity:
          domain: input_boolean

    schedule_end:
      name: Schedule End Time
      description: End time for charging window
      default: "22:00:00"
      selector:
        time:

variables:
  cfg_voltage: !input voltage
  cfg_phases: !input phases
  cfg_power_buffer: !input power_buffer
  cfg_min_current: !input min_current
  cfg_max_current: !input max_current
  cfg_schedule_start: !input schedule_start
  cfg_schedule_end: !input schedule_end
  power_sensor_entity: !input power_sensor
  max_current_entity_id: !input max_current_entity
  enable_switch_entity: !input enable_switch

trigger:
  - platform: time_pattern
    seconds: !input adjustment_interval
    id: "periodic"
  - platform: state
    entity_id: !input enable_switch
    id: "enable_switch_changed"
  - platform: time
    at: !input schedule_start
    id: "schedule_started"
  - platform: time
    at: !input schedule_end
    id: "schedule_ended"

action:
  - variables:
      disabled_current: 0
      raw_grid_power: "{{ states(power_sensor_entity) | float(0) }}"
      current_limit_amps: "{{ states(max_current_entity_id) | float(0) }}"
      watts_per_amp: "{{ ((cfg_voltage | float(230)) * (cfg_phases | float(1))) | float(1) }}"
      safe_min_current: "{{ [cfg_min_current | int(0), cfg_max_current | int(0)] | min }}"
      solar_charge_enabled: "{{ is_state(enable_switch_entity, 'on') }}"
      schedule_active: >-
        {% set start = today_at(cfg_schedule_start) %}
        {% set end = today_at(cfg_schedule_end) %}
        {{ start <= now() < end if start <= end else now() >= start or now() < end }}
      solar_charge_active: "{{ (solar_charge_enabled | bool(false)) and (schedule_active | bool(false)) }}"
      power_sensor_ready: "{{ states(power_sensor_entity) not in ['unavailable', 'unknown', 'none'] }}"
      current_entity_ready: "{{ states(max_current_entity_id) not in ['unavailable', 'unknown', 'none'] }}"
  - choose:
      - conditions:
          - condition: template
            value_template: >
              {{ (current_entity_ready | bool(false))
                 and not (solar_charge_active | bool(false))
                 and (current_limit_amps | float(0)) != (disabled_current | float(0)) }}
        sequence:
          - service: number.set_value
            target:
              entity_id: !input max_current_entity
            data:
              value: "{{ disabled_current }}"

      - conditions:
          - condition: template
            value_template: >
              {{ (solar_charge_active | bool(false))
                 and (power_sensor_ready | bool(false))
                 and (current_entity_ready | bool(false)) }}
        sequence:
          - variables:
              raw_target_amps: >
                {% set grid_power = raw_grid_power | float(0) %}
                {% set current_amps = current_limit_amps | float(0) %}
                {% set buffer_watts = cfg_power_buffer | float(0) %}
                {% set per_amp = watts_per_amp | float(1) %}
                {% set delta_watts = (-buffer_watts) - grid_power %}
                {% if delta_watts >= 0 %}
                  {% set delta_amps = (delta_watts / per_amp) | int %}
                {% else %}
                  {% set delta_amps = -(((delta_watts | abs) / per_amp) | round(0, 'ceil') | int) %}
                {% endif %}
                {{ (current_amps + delta_amps) | int }}
              target_amps: >
                {% set proposed = raw_target_amps | int %}
                {% set min_current = safe_min_current | int(0) %}
                {% set max_current = cfg_max_current | int(0) %}
                {% set clamped = [[proposed, max_current] | min, 0] | max %}
                {% if clamped == 0 %}
                  0
                {% elif min_current <= 0 %}
                  {{ clamped }}
                {% elif clamped < min_current %}
                  0
                {% else %}
                  {{ clamped }}
                {% endif %}
          - choose:
              - conditions:
                  - condition: template
                    value_template: "{{ target_amps | int != current_limit_amps | int }}"
                sequence:
                  - service: number.set_value
                    target:
                      entity_id: !input max_current_entity
                    data:
                      value: "{{ target_amps }}"

mode: restart
max_exceeded: silent
