blueprint:
  name: Solar Charge Dynamic Current
  description: |
    Dynamically adjusts EV charging current based on available solar export power.
    - Cold start: begins at ~75% of available export to reduce sluggish starts
    - Lowers current immediately when export drops while still exporting
    - Import: reduces proportionally (not to zero) to avoid stop/start jitter
    - Only drops to minimum after 20s of sustained grid import (ignores brief clouds)
    - Raises current immediately on the next adjustment cycle when more solar is available
    - Turning off solar charge or leaving the schedule window sets charger current to 0A
    - Formula: Target Amps = (Effective Export + Current Charger Draw - Buffer) / (Voltage × Phases)
    - Accounts for home battery discharge (won't drain battery to charge car)
    - Keeps active solar charging between configurable min/max limits
  domain: automation
  source_url: https://github.com/yourusername/auto-charge
  input:
    power_sensor:
      name: Power Sensor
      description: Grid power sensor (should be negative when exporting to grid)
      selector:
        entity:
          domain: sensor
          device_class: power

    max_current_entity:
      name: Maximum Current Control
      description: Number entity that controls the charger's maximum current
      selector:
        entity:
          domain: number

    voltage:
      name: Grid Voltage
      description: Your grid voltage (typically 230V or 240V)
      default: 230
      selector:
        number:
          min: 100
          max: 250
          step: 1
          unit_of_measurement: "V"

    phases:
      name: Number of Phases
      description: Number of phases your charger uses (1 for single-phase, 3 for three-phase)
      default: 1
      selector:
        number:
          min: 1
          max: 3
          step: 1

    power_buffer:
      name: Power Buffer
      description: Safety buffer to stay below export level (prevents grid import)
      default: 100
      selector:
        number:
          min: 0
          max: 1000
          step: 50
          unit_of_measurement: "W"

    min_current:
      name: Minimum Current
      description: Minimum charging current while solar charge is active
      default: 0
      selector:
        number:
          min: 0
          max: 16
          step: 1
          unit_of_measurement: "A"

    max_current:
      name: Maximum Current
      description: Maximum charging current (typically 16A or 32A)
      default: 32
      selector:
        number:
          min: 6
          max: 32
          step: 1
          unit_of_measurement: "A"

    schedule_start:
      name: Schedule Start Time
      description: Start time for charging window
      default: "09:00:00"
      selector:
        time:

    enable_switch:
      name: Solar Charge Enable Switch
      description: Toggle switch to enable/disable solar charging. Turning this off sets charger current to 0A.
      selector:
        entity:
          domain: input_boolean

    battery_power_sensor:
      name: Battery Power Sensor
      description: >
        Battery charge/discharge power sensor.
        Positive = discharging (feeding house), Negative = charging (absorbing solar).
        Used to prevent draining the home battery to charge the car.
      selector:
        entity:
          domain: sensor
          device_class: power

    schedule_end:
      name: Schedule End Time
      description: End time for charging window
      default: "22:00:00"
      selector:
        time:

variables:
  cfg_voltage: !input voltage
  cfg_phases: !input phases
  cfg_power_buffer: !input power_buffer
  cfg_min_current: !input min_current
  cfg_max_current: !input max_current
  cfg_schedule_start: !input schedule_start
  cfg_schedule_end: !input schedule_end
  power_sensor_entity: !input power_sensor
  max_current_entity_id: !input max_current_entity
  enable_switch_entity: !input enable_switch
  battery_power_entity: !input battery_power_sensor

trigger:
  - platform: time_pattern
    seconds: "/20"
    id: "periodic"
  - platform: state
    entity_id: !input enable_switch
    id: "enable_switch_changed"
  - platform: time
    at: !input schedule_start
    id: "schedule_started"
  - platform: time
    at: !input schedule_end
    id: "schedule_ended"
  - platform: numeric_state
    entity_id: !input power_sensor
    above: 0
    for:
      seconds: 20
    id: "sustained_import"

action:
  - variables:
      disabled_current: 0
      raw_grid_power: "{{ states(power_sensor_entity) | float(0) }}"
      battery_power: "{{ states(battery_power_entity) | float(0) }}"
      current_limit_amps: "{{ states(max_current_entity_id) | float(0) }}"
      safe_min_current: "{{ [cfg_min_current | int, cfg_max_current | int] | min }}"
      solar_charge_enabled: "{{ is_state(enable_switch_entity, 'on') }}"
      schedule_active: >-
        {% set start = today_at(cfg_schedule_start) %}{% set end = today_at(cfg_schedule_end) %}{{ start <= now() < end if start <= end else now() >= start or now() < end }}
      solar_charge_active: "{{ (solar_charge_enabled | bool(false)) and (schedule_active | bool(false)) }}"
      power_sensor_ready: "{{ states(power_sensor_entity) not in ['unavailable', 'unknown', 'none'] }}"
      current_entity_ready: "{{ states(max_current_entity_id) not in ['unavailable', 'unknown', 'none'] }}"
      battery_sensor_ready: "{{ states(battery_power_entity) not in ['unavailable', 'unknown', 'none'] }}"
      all_sensors_ready: "{{ (power_sensor_ready | bool(false)) and (current_entity_ready | bool(false)) and (battery_sensor_ready | bool(false)) }}"
  - choose:
      # Solar charge is disabled or outside the schedule window: stop charging.
      - conditions:
          - condition: template
            value_template: >
              {{ (current_entity_ready | bool(false))
                 and (current_limit_amps | float(0)) > (disabled_current | float(0))
                 and not (solar_charge_active | bool(false)) }}
        sequence:
          - service: number.set_value
            target:
              entity_id: !input max_current_entity
            data:
              value: "{{ disabled_current }}"

      # Solar charge is active and all required sensors are available: adjust current.
      - conditions:
          - condition: template
            value_template: >
              {{ (solar_charge_active | bool(false))
                 and (all_sensors_ready | bool(false)) }}
        sequence:
          - variables:
              watts_per_amp: "{{ (cfg_voltage | float(0)) * (cfg_phases | float(0)) }}"
              effective_grid_power: >
                {% set battery_discharge = [battery_power | float(0), 0] | max %}
                {{ raw_grid_power | float(0) + battery_discharge }}
              target_amps: >
                {% set grid_power = effective_grid_power | float(0) %}
                {% set current = current_limit_amps | float(0) %}
                {% set watts_per_amp = watts_per_amp | float(1) %}
                {% if grid_power < 0 %}
                  {% set charger_draw = current * watts_per_amp %}
                  {% set available_watts = (grid_power | abs) + charger_draw - cfg_power_buffer %}
                  {% set calculated_amps = (available_watts / watts_per_amp) | int %}
                  {% if current | int <= safe_min_current | int %}
                    {# Cold start: leave some headroom, but ramp faster than the original 50% start #}
                    {% set start_amps = (((grid_power | abs) - cfg_power_buffer) / watts_per_amp * 0.75) | int %}
                    {{ [[start_amps, cfg_max_current] | min, [6, safe_min_current] | max] | max | int }}
                  {% else %}
                    {{ [[calculated_amps, cfg_max_current] | min, safe_min_current] | max | int }}
                  {% endif %}
                {% else %}
                  {# Importing: reduce proportionally rather than dropping to min #}
                  {% set import_watts = grid_power + cfg_power_buffer %}
                  {% set reduce_amps = (import_watts / watts_per_amp) | round(0, 'ceil') | int + 1 %}
                  {% set gentle_target = current | int - reduce_amps %}
                  {{ [[gentle_target, cfg_max_current] | min, safe_min_current] | max | int }}
                {% endif %}
              should_lower_now: >
                {% set target = target_amps | int %}
                {% set current = current_limit_amps | int %}
                {% if target >= current %}
                  false
                {% elif current > (cfg_max_current | int) %}
                  true
                {% elif effective_grid_power | float(0) < 0 %}
                  true
                {% elif battery_power | float(0) > 0 %}
                  true
                {% elif trigger.id in ['sustained_import', 'enable_switch_changed', 'schedule_started'] %}
                  true
                {% else %}
                  false
                {% endif %}
          - choose:
              # Case 1: LOWER current
              # - If still exporting (power < 0): adjust proportionally right away
              # - If importing (power >= 0): wait for sustained import, unless we are above the configured max
              - conditions:
                  - condition: template
                    value_template: "{{ should_lower_now | bool(false) }}"
                sequence:
                  - service: number.set_value
                    target:
                      entity_id: !input max_current_entity
                    data:
                      value: "{{ target_amps }}"

              # Case 2: RAISE current
              # Raise immediately on the next adjustment cycle when more surplus is available
              - conditions:
                  - condition: template
                    value_template: "{{ target_amps | int > current_limit_amps | int }}"
                sequence:
                  - service: number.set_value
                    target:
                      entity_id: !input max_current_entity
                    data:
                      value: "{{ target_amps }}"

mode: single
