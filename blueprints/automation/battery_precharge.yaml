blueprint:
  name: Battery Pre-Charge on Low Price
  description: |
    Forces battery charging when the energy price is below a configurable threshold
    AND within a configurable time window before a target tariff period starts.

    Designed for Coopernico Go (Coperni Go) tariff periods: Vazio, Ponta, Cheio.
    Example use case: charge the battery during cheap Vazio hours before Ponta begins.
  domain: automation
  source_url: https://github.com/yourusername/auto-charge
  input:
    energy_price_sensor:
      name: Energy Price Sensor
      description: Sensor that shows the current energy price (e.g. in €/kWh)
      selector:
        entity:
          domain: sensor

    tariff_period_sensor:
      name: Tariff Period Sensor
      description: Sensor that shows the current tariff period (e.g. "vazio", "ponta", "cheio" from Coperni Go)
      selector:
        entity:
          domain: sensor

    price_threshold:
      name: Price Threshold
      description: Maximum energy price at which pre-charging is allowed (in €/kWh)
      default: 0.10
      selector:
        number:
          min: 0.0
          max: 1.0
          step: 0.01
          unit_of_measurement: "€/kWh"

    target_tariff_period:
      name: Target Tariff Period
      description: >
        The tariff period you want to prepare for (e.g. "ponta").
        The battery will charge before this period starts.
      default: "ponta"
      selector:
        select:
          options:
            - "vazio"
            - "ponta"
            - "cheio"

    time_before_period:
      name: Time Before Target Period
      description: How many minutes before the target tariff period starts to begin charging
      default: 60
      selector:
        number:
          min: 15
          max: 240
          step: 15
          unit_of_measurement: "min"

    charge_service:
      name: Battery Charge Service
      description: >
        The service to call to force battery charging (e.g. number.set_value, switch.turn_on,
        or a custom service like huawei_solar.force_charge)
      selector:
        action:

    stop_charge_service:
      name: Stop Battery Charge Service
      description: >
        The service to call to stop forced battery charging when conditions are no longer met
        (e.g. switch.turn_off, or a custom service)
      selector:
        action:

    enable_switch:
      name: Enable Switch
      description: Toggle switch to enable/disable this automation (input_boolean)
      selector:
        entity:
          domain: input_boolean

    check_interval:
      name: Check Interval
      description: How often to re-evaluate conditions (in minutes)
      default: 5
      selector:
        number:
          min: 1
          max: 30
          step: 1
          unit_of_measurement: "min"

variables:
  energy_price_entity: !input energy_price_sensor
  tariff_period_entity: !input tariff_period_sensor
  cfg_price_threshold: !input price_threshold
  cfg_target_tariff: !input target_tariff_period
  cfg_time_before: !input time_before_period
  enable_switch_entity: !input enable_switch

trigger:
  - id: "periodic_check"
    platform: time_pattern
    minutes: !input check_interval

  - id: "tariff_changed"
    platform: state
    entity_id: !input tariff_period_sensor

  - id: "price_changed"
    platform: state
    entity_id: !input energy_price_sensor

condition:
  - condition: template
    value_template: "{{ states(enable_switch_entity) == 'on' }}"
  - condition: template
    value_template: >
      {{ states(energy_price_entity) not in ['unavailable', 'unknown', 'none']
         and states(tariff_period_entity) not in ['unavailable', 'unknown', 'none'] }}

action:
  - variables:
      current_price: "{{ states(energy_price_entity) | float(999) }}"
      current_tariff: "{{ states(tariff_period_entity) | lower | trim }}"
      price_is_low: "{{ current_price <= cfg_price_threshold | float(0) }}"
      is_target_period: "{{ current_tariff == cfg_target_tariff | lower | trim }}"
      next_period_attr: "{{ state_attr(tariff_period_entity, 'next_tariff') | default('') | lower | trim }}"
      next_change_str: "{{ state_attr(tariff_period_entity, 'next_change') | default('') }}"
  - variables:
      minutes_until_target: >
        {% if is_target_period %}
          0
        {% elif next_period_attr == cfg_target_tariff | lower | trim and next_change_str != '' %}
          {% set next_ts = as_timestamp(next_change_str, default=0) %}
          {% if next_ts > 0 %}
            {{ ((next_ts - as_timestamp(now())) / 60) | round(0) }}
          {% else %}
            9999
          {% endif %}
        {% else %}
          9999
        {% endif %}
      should_charge: >
        {{ price_is_low | bool(false)
           and not is_target_period
           and minutes_until_target | int(9999) <= cfg_time_before | int(60)
           and minutes_until_target | int(9999) > 0 }}

  - choose:
      # START charging: price is low and within time window before target period
      - conditions:
          - condition: template
            value_template: "{{ should_charge | bool(false) }}"
        sequence: !input charge_service

      # STOP charging: conditions no longer met (price too high, target period started, or outside window)
      - conditions:
          - condition: template
            value_template: "{{ not (should_charge | bool(false)) }}"
        sequence: !input stop_charge_service

mode: single
