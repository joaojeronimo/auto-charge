blueprint:
  name: Auto-Charge Dynamic Current Adjustment
  description: |
    Dynamically adjusts EV charging current based on available solar export power.
    - Cold start: begins at ~50% of available export to avoid overshoot oscillation
    - Lowers current immediately when export drops while still exporting
    - Import: reduces proportionally (not to zero) to avoid stop/start jitter
    - Only drops to minimum after 20s of sustained grid import (ignores brief clouds)
    - Raises current only after sustained high export (stable)
    - Formula: Target Amps = (Exported Power - Buffer) / (Voltage × Phases)
    - Keeps current between configurable min/max limits
  domain: automation
  source_url: https://github.com/yourusername/auto-charge
  input:
    power_sensor:
      name: Power Sensor
      description: Grid power sensor (should be negative when exporting to grid)
      selector:
        entity:
          domain: sensor
          device_class: power

    max_current_entity:
      name: Maximum Current Control
      description: Number entity that controls the charger's maximum current
      selector:
        entity:
          domain: number

    voltage:
      name: Grid Voltage
      description: Your grid voltage (typically 230V or 240V)
      default: 230
      selector:
        number:
          min: 100
          max: 250
          step: 1
          unit_of_measurement: "V"

    phases:
      name: Number of Phases
      description: Number of phases your charger uses (1 for single-phase, 3 for three-phase)
      default: 1
      selector:
        number:
          min: 1
          max: 3
          step: 1

    power_buffer:
      name: Power Buffer
      description: Safety buffer to stay below export level (prevents grid import)
      default: 100
      selector:
        number:
          min: 0
          max: 1000
          step: 50
          unit_of_measurement: "W"

    min_current:
      name: Minimum Current
      description: Minimum charging current (usually 0 or 6A depending on charger)
      default: 0
      selector:
        number:
          min: 0
          max: 16
          step: 1
          unit_of_measurement: "A"

    max_current:
      name: Maximum Current
      description: Maximum charging current (typically 16A or 32A)
      default: 32
      selector:
        number:
          min: 6
          max: 32
          step: 1
          unit_of_measurement: "A"

    raise_delay:
      name: Raise Delay
      description: Wait time before raising current (prevents oscillation)
      default: 3
      selector:
        number:
          min: 1
          max: 10
          step: 1
          unit_of_measurement: "min"

    schedule_start:
      name: Schedule Start Time
      description: Start time for charging window
      default: "09:00:00"
      selector:
        time:

    enable_switch:
      name: Solar Charge Enable Switch
      description: Toggle switch to enable/disable solar charging (input_boolean)
      selector:
        entity:
          domain: input_boolean

    schedule_end:
      name: Schedule End Time
      description: End time for charging window
      default: "22:00:00"
      selector:
        time:

variables:
  cfg_voltage: !input voltage
  cfg_phases: !input phases
  cfg_power_buffer: !input power_buffer
  cfg_min_current: !input min_current
  cfg_max_current: !input max_current
  cfg_raise_delay: !input raise_delay
  power_sensor_entity: !input power_sensor
  max_current_entity_id: !input max_current_entity
  enable_switch_entity: !input enable_switch

trigger:
  - platform: time_pattern
    seconds: "/20"
    id: "periodic"
  - platform: numeric_state
    entity_id: !input power_sensor
    above: 0
    for:
      seconds: 20
    id: "sustained_import"

condition:
  - condition: template
    value_template: "{{ states(enable_switch_entity) == 'on' }}"
  - condition: time
    after: !input schedule_start
    before: !input schedule_end
  - condition: template
    value_template: >
      {{ states(power_sensor_entity) not in ['unavailable', 'unknown', 'none']
         and states(max_current_entity_id) not in ['unavailable', 'unknown', 'none'] }}

action:
  - variables:
      power_export: "{{ states(power_sensor_entity) | float(0) }}"
      current_max_amps: "{{ states(max_current_entity_id) | float(0) }}"
  - variables:
      target_amps: >
        {% set power_export = power_export | float(0) %}
        {% set cur = current_max_amps | float(0) %}
        {% set wpc = cfg_voltage * cfg_phases %}
        {% if power_export < 0 %}
          {% set charger_draw = cur * wpc %}
          {% set available_watts = (power_export | abs) + charger_draw - cfg_power_buffer %}
          {% set calculated_amps = (available_watts / wpc) | int %}
          {% if cur | int <= cfg_min_current | int %}
            {# Cold start: charger isn't drawing yet, so be conservative (50%) to avoid overshoot #}
            {% set start_amps = (((power_export | abs) - cfg_power_buffer) / wpc * 0.5) | int %}
            {{ [[start_amps, cfg_max_current] | min, [6, cfg_min_current] | max] | max | int }}
          {% else %}
            {{ [[calculated_amps, cfg_max_current] | min, cfg_min_current] | max | int }}
          {% endif %}
        {% else %}
          {# Importing: reduce proportionally rather than dropping to min #}
          {% set import_watts = power_export + cfg_power_buffer %}
          {% set reduce_amps = (import_watts / wpc) | round(0, 'ceil') | int + 1 %}
          {% set gentle_target = cur | int - reduce_amps %}
          {{ [[gentle_target, cfg_max_current] | min, cfg_min_current] | max | int }}
        {% endif %}

  - choose:
      # Case 1: LOWER current
      # - If still exporting (power < 0): adjust proportionally on periodic check
      # - If importing (power >= 0): only lower after 20s sustained import trigger
      - conditions:
          - condition: template
            value_template: >
              {{ target_amps | int < current_max_amps | int
                 and (power_export | float(0) < 0 or trigger.id == 'sustained_import') }}
        sequence:
          - service: number.set_value
            target:
              entity_id: !input max_current_entity
            data:
              value: "{{ target_amps }}"

      # Case 2: RAISE current (only after sustained high export)
      # Only raise if target is higher AND the current setting has been stable
      # (not lowered) for raise_delay minutes, indicating sustained export
      - conditions:
          - condition: template
            value_template: >
              {{ target_amps | int > current_max_amps | int
                 and (as_timestamp(now()) - as_timestamp(states[max_current_entity_id].last_changed)) > (cfg_raise_delay * 60) }}
        sequence:
          - service: number.set_value
            target:
              entity_id: !input max_current_entity
            data:
              value: "{{ target_amps }}"

mode: single
